# MSLS Phase II — FULL paper configuration (suppl. A). Target: Linux + Blackwell.
# CHANGE ON LINUX: paths, as in msls_phase1_full.yaml.
model:
  sigma: [1, 8, 256]
  tempgeo_layers: 2
  tempgeo_heads: 8
  tempgeo_dropout: 0.1
  refiner_encoder_layers: 1
  refiner_decoder_layers: 2
  refiner_heads: 8
  refiner_ff: 2048
  refiner_dropout: 0.1
  max_len: 512
  embed_dim: 512
  geoclip_init: false

data:
  kind: msls
  mode: features
  msls_root: /data/PaperRepro/datasets/msls/extracted
  train_index: /data/PaperRepro/datasets/msls/index/train.csv
  val_index: /data/PaperRepro/datasets/msls/index/val.csv
  train_cities: null
  val_cities: null
  train_features_dir: /data/PaperRepro/datasets/msls/features/train
  val_features_dir: /data/PaperRepro/datasets/msls/features/val
  frames_per_seq: 16
  image_size: 224
  num_workers: 12

train:
  phase1_ckpt: runs/msls_full/phase1_latest.pt
  batch_size: 128
  epochs: 100                   # suppl. A (Phase II)
  lr: 1.0e-4
  lr_decay: 0.95
  warmup_steps: 1000
  symmetric_ce: true
  grad_clip: null

noise:
  collapse_prob: 0.1
  jitter_range: [0.001, 0.02]
  shift_range: [-0.2, 0.2]

loss:
  alpha: 10.0
  beta: 1.0

eval:
  batch_size: 8
  resolution_km: 0.1
  gallery_chunk: 65536
  gallery_path: runs/msls_full/gallery_val_cities.npy
  padding_deg: 0.02

run:
  dir: runs/msls_full
  device: auto
  seed: 0
  log_every: 50
  ckpt_every_epochs: 5
