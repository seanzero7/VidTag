# Unified model Phase I (paper suppl. H, Tables 12-13): one model trained on
# MSLS + CityGuessr68k + GAMa mixed. 200 epochs, LR decay 0.97 (suppl. H);
# everything else as MSLS. All three sources must be precomputed to features
# first (vidtag.train.precompute). Evaluate per-dataset against this
# checkpoint using each dataset's own config.
model:
  sigma: [1, 8, 256]
  tempgeo_layers: 2
  tempgeo_heads: 8
  tempgeo_ff: 2400              # pinned by paper Table 8 param budget (GUESSES #4)
  tempgeo_dropout: 0.1
  refiner_encoder_layers: 1
  refiner_decoder_layers: 2
  refiner_heads: 8
  refiner_ff: 2048
  refiner_dropout: 0.1
  max_len: 512
  embed_dim: 512
  geoclip_init: true
  geoclip_location_weights: /data/PaperRepro/weights/geoclip/location_encoder_weights.pth
  geoclip_logit_scale_weights: /data/PaperRepro/weights/geoclip/logit_scale_weights.pth

data:
  kind: unified
  mode: features
  frames_per_seq: 16
  num_workers: 12
  per_city_cap: 80              # suppl. H rule 2c
  msls:
    msls_root: /data/PaperRepro/datasets/msls/extracted
    train_index: /data/PaperRepro/datasets/msls/index/train.csv
    features_dir: /data/PaperRepro/datasets/msls/features/train
  cityguessr:
    root: /data/PaperRepro/datasets/cityguessr68k
    features_dir: /data/PaperRepro/datasets/cityguessr68k/features/train
  gama:
    root: /data/PaperRepro/datasets/gama
    features_dir: /data/PaperRepro/datasets/gama/features/train

train:
  batch_size: 128
  epochs: 200                   # suppl. H
  lr: 5.0e-5
  lr_decay: 0.97                # suppl. H
  warmup_steps: 1000
  symmetric_ce: true
  grad_clip: null

noise:
  collapse_prob: 0.1
  jitter_range: [0.001, 0.02]
  shift_range: [-0.2, 0.2]

loss:
  alpha: 10.0
  beta: 1.0

eval:
  batch_size: 8
  resolution_km: 0.1
  gallery_chunk: 65536
  gallery_path: runs/unified_full/gallery.npy
  padding_deg: 0.02

run:
  dir: runs/unified_full
  device: auto
  seed: 0
  log_every: 50
  ckpt_every_epochs: 10
