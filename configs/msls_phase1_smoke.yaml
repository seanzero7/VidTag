# MSLS Phase I smoke training on Mac/MPS: 3 small cities, cached features.
# Proof of correctness only — full training uses msls_phase1_full.yaml.
model:
  sigma: [1, 8, 256]
  tempgeo_layers: 2
  tempgeo_heads: 8
  tempgeo_ff: 2400               # pinned by paper Table 8 param budget (GUESSES #4)
  tempgeo_dropout: 0.1
  refiner_encoder_layers: 1
  refiner_decoder_layers: 2
  refiner_heads: 8
  refiner_ff: 2048
  refiner_dropout: 0.1
  max_len: 512
  embed_dim: 512
  geoclip_init: true
  geoclip_location_weights: /Volumes/8TBExternal/PaperRepro/weights/geoclip/location_encoder_weights.pth
  geoclip_logit_scale_weights: /Volumes/8TBExternal/PaperRepro/weights/geoclip/logit_scale_weights.pth

data:
  kind: msls
  mode: features
  msls_root: /Volumes/8TBExternal/PaperRepro/datasets/msls/extracted
  train_index: /Volumes/8TBExternal/PaperRepro/datasets/msls/index/train.csv
  val_index: /Volumes/8TBExternal/PaperRepro/datasets/msls/index/val.csv
  train_cities: [zurich, amsterdam, trondheim]
  val_cities: [zurich, amsterdam, trondheim]
  train_features_dir: /Volumes/8TBExternal/PaperRepro/datasets/msls/features/train_smoke
  val_features_dir: /Volumes/8TBExternal/PaperRepro/datasets/msls/features/train_smoke
  frames_per_seq: 16
  image_size: 224
  num_workers: 4

train:
  batch_size: 32                # paper: 128 (full config); smaller for MPS smoke
  epochs: 30
  lr: 5.0e-5                    # paper suppl. A
  lr_decay: 0.99                # paper suppl. A
  warmup_steps: 100             # paper: 1000; scaled to smoke run length
  symmetric_ce: true
  grad_clip: null

noise:
  collapse_prob: 0.1
  jitter_range: [0.001, 0.02]
  shift_range: [-0.2, 0.2]

loss:
  alpha: 10.0
  beta: 1.0

eval:
  batch_size: 2
  resolution_km: 0.1            # paper §5.5 for MSLS
  gallery_chunk: 8192
  gallery_path: runs/msls_smoke/gallery_train_grid.npy
  padding_deg: 0.02

run:
  dir: runs/msls_smoke
  device: auto
  seed: 0
  log_every: 10
  ckpt_every_epochs: 5
